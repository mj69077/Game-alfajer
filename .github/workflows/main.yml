name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Organize Files
        run: |
          # 1. فك الضغط (أياً كان اسم الملف Kk)
          unzip -o Kk.zip -d ./ || unzip -o Kk -d ./ || true
          
          # 2. البحث عن ملف project.godot ونقل كل شيء لمكانه الصحيح
          PROJECT_FILE=$(find . -name "project.godot" | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            PROJECT_DIR=$(dirname "$PROJECT_FILE")
            if [ "$PROJECT_DIR" != "." ]; then
              mv "$PROJECT_DIR"/* ./
            fi
          fi
          
          # 3. إظهار الملفات في الـ Log لنعرف أين المشكلة لو فشل
          ls -R

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip -q Godot_v3.5.3-stable_linux_headless.64.zip
          chmod +x Godot_v3.5.3-stable_linux_headless.64

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          unzip -q Godot_v3.5.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/templates/3.5.3.stable/

      - name: Setup Export Presets
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/game.apk"
          script_export_mode=1
          [preset.0.options]
          custom_package/debug=""
          custom_package/release=""
          package/unique_name="com.mj69077.gamealfajr"
          package/name="Game Alfajr"
          package/signed=false
          EOF

      - name: Build APK
        run: |
          mkdir -p build
          # استخدام --verbose لمعرفة سبب الخطأ الحقيقي
          ./Godot_v3.5.3-stable_linux_headless.64 --verbose --export "Android" build/game.apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/game.apk
