name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Force Move
        run: |
          # فك الضغط في مجلد مستقل
          unzip -o Kk.zip -d extracted_files || unzip -o Kk -d extracted_files || true
          
          # البحث عن ملف المشروع ونقله فوراً للجذر
          PROJECT_FILE=$(find extracted_files -name "project.godot" | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            PROJECT_DIR=$(dirname "$PROJECT_FILE")
            echo "Moving files from $PROJECT_DIR to root..."
            cp -r "$PROJECT_DIR"/* ./
          else
            echo "!! ERROR: project.godot not found anywhere !!"
            exit 1
          fi
          
          # التأكد من وجود المجلدات المطلوبة
          mkdir -p build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip -q Godot_v3.5.3-stable_linux_headless.64.zip
          chmod +x Godot_v3.5.3-stable_linux_headless.64

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          unzip -q Godot_v3.5.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/templates/3.5.3.stable/

      - name: Create Force Export Presets
        run: |
          # حذف أي ملف قديم وإنشاء واحد جديد ونظيف تماماً
          rm -f export_presets.cfg
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          export_path="build/game.apk"
          [preset.0.options]
          package/unique_name="com.mj69077.gamealfajr"
          package/name="Game Alfajr"
          package/signed=false
          package/architecture_2=true
          package/architecture_3=true
          EOF

      - name: Build APK (Detailed Logs)
        run: |
          # محاولة البناء مع إظهار التفاصيل -verbose
          ./Godot_v3.5.3-stable_linux_headless.64 --verbose --export "Android" build/game.apk || echo "Build failed, but continuing to check logs..."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/game.apk
