name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Cleanup
        run: |
          unzip -o Kk.zip -d temp_files || unzip -o Kk -d temp_files || true
          PROJECT_DIR=$(find temp_files -name "project.godot" -printf '%h\n' | head -n 1)
          if [ -n "$PROJECT_DIR" ]; then
            cp -r "$PROJECT_DIR"/* ./
          fi
          rm -rf temp_files Pixel-Platformer-master
          mkdir -p build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot 3.5.3
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip -q Godot_v3.5.3-stable_linux_headless.64.zip
          mv Godot_v3.5.3-stable_linux_headless.64 godot3
          chmod +x godot3

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          unzip -q Godot_v3.5.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/templates/3.5.3.stable/

      - name: Prepare Keystore and Settings
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999
          mkdir -p ~/.config/godot/
          cat > ~/.config/godot/editor_settings.3 << EOF
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$(pwd)/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Create Export Presets
        run: |
          cat > export_presets.cfg << EOF
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          export_path="build/game.apk"
          [preset.0.options]
          package/unique_name="com.mj69077.gamealfajr"
          package/name="Game Alfajr"
          architecture/armeabi-v7a=true
          architecture/arm64-v8a=true
          keystore/debug="$(pwd)/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          EOF

      - name: Build APK
        run: |
          ./godot3 --export "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/game.apk
