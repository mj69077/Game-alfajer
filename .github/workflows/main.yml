name: Build Android APK

on:
  push:
    branches: [ main ] # تم الضبط ليعمل على فرع main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Unzip and Organize Files
        run: |
          # فك ضغط الملف Kk (سواء كان بلاحقة .zip أو بدون)
          unzip -o Kk.zip -d ./ || unzip -o Kk -d ./ || true
          
          # البحث عن ملف project.godot ونقل محتوياته للمسار الرئيسي إذا كان داخل مجلد فرعي
          if [ ! -f "project.godot" ]; then
            SUB_DIR=$(find . -name "project.godot" -printf '%h\n' | head -n 1)
            if [ -n "$SUB_DIR" ] && [ "$SUB_DIR" != "." ]; then
              mv "$SUB_DIR"/* ./
            fi
          fi
          # عرض الملفات للتأكد من وجود project.godot في الجذر
          ls -F

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip -q Godot_v3.5.3-stable_linux_headless.64.zip
          chmod +x Godot_v3.5.3-stable_linux_headless.64

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          unzip -q Godot_v3.5.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/templates/3.5.3.stable/

      - name: Setup Export Presets
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/game.apk"
          script_export_mode=1
          [preset.0.options]
          custom_package/debug=""
          custom_package/release=""
          package/unique_name="com.sg3.pixelplatformer"
          package/name="Pixel Platformer"
          package/signed=false
          EOF

      - name: Build APK
        run: |
          mkdir -p build
          ./Godot_v3.5.3-stable_linux_headless.64 --export "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: game-apk
          path: build/game.apk
