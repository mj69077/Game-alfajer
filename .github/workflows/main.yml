name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Move
        run: |
          unzip -o Kk.zip -d ./ || unzip -o Kk -d ./ || true
          PROJECT_DIR=$(find . -name "project.godot" -printf '%h\n' | head -n 1)
          if [ -n "$PROJECT_DIR" ] && [ "$PROJECT_DIR" != "." ]; then
            cp -r "$PROJECT_DIR"/* ./
          fi
          mkdir -p build

      - name: Setup Java & Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot & Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip -q Godot_v3.5.3-stable_linux_headless.64.zip
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          unzip -q Godot_v3.5.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/templates/3.5.3.stable/

      - name: Configure Godot Path
        run: |
          # إخبار جودو بمكان الـ Android SDK يدوياً
          mkdir -p ~/.config/godot/
          echo 'export/android/android_sdk_path = "/usr/local/lib/android/sdk"' > ~/.config/godot/editor_settings.3
          echo 'export/android/debug_keystore = ""' >> ~/.config/godot/editor_settings.3

      - name: Create Export Presets
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          export_path="build/game.apk"
          [preset.0.options]
          package/unique_name="com.mj69077.gamealfajr"
          package/name="Game Alfajr"
          package/signed=false
          package/architecture_2=true
          EOF

      - name: Build APK
        run: |
          # هنا جودو سيحاول التصدير، وإذا فشل سيتوقف الـ Action تماماً لنعرف السبب
          ./Godot_v3.5.3-stable_linux_headless.64 --export "Android" build/game.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/game.apk
