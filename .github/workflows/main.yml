name: Build Android APK (Godot 4 Absolute Fix)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Cleanup
        run: |
          unzip -o Kk.zip -d temp_files || unzip -o Kk -d temp_files || true
          PROJECT_DIR=$(find temp_files -name "project.godot" -printf '%h\n' | head -n 1)
          if [ -n "$PROJECT_DIR" ]; then
            cp -r "$PROJECT_DIR"/* ./
          fi
          rm -rf temp_files Pixel-Platformer-master
          mkdir -p build

      - name: Setup Java & Android SDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot & Templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 godot4
          chmod +x godot4
          
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Configure Godot Editor Settings
        run: |
          # هذه الخطوة هي التي تحل خطأ "Configuration Errors"
          mkdir -p ~/.config/godot/
          cat > ~/.config/godot/editor_settings-4.tre << EOF
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$(pwd)/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          # إنشاء الكيستور المطلوب للإعدادات
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999

      - name: Create Export Presets
        run: |
          cat > export_presets.cfg << EOF
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/game.apk"
          [preset.0.options]
          package/unique_name="com.mj69077.gamealfajr"
          package/name="Game Alfajr"
          architecture/armeabi-v7a=true
          architecture/arm64-v8a=true
          keystore/debug="$(pwd)/debug.keystore"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          EOF

      - name: Build APK
        run: |
          # ملاحظة: أضفت --editor --quit للتأكد من استيراد الملفات قبل التصدير
          ./godot4 --headless --editor --quit --display-driver headless || true
          ./godot4 --headless --export-release "Android" build/game.apk --display-driver headless

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/game.apk
