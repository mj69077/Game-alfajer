name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Organize Files
        run: |
          # فك الضغط ومحاولة استخراج الملفات
          unzip -o Kk.zip -d ./ || unzip -o Kk -d ./ || true
          
          # نقل الملفات للجذر إذا كانت داخل مجلد فرعي
          PROJECT_FILE=$(find . -name "project.godot" | head -n 1)
          if [ -n "$PROJECT_FILE" ]; then
            PROJECT_DIR=$(dirname "$PROJECT_FILE")
            if [ "$PROJECT_DIR" != "." ]; then
              cp -r "$PROJECT_DIR"/* ./
            fi
          fi
          
          # إنشاء ملفات الإعدادات الضرورية لـ Godot
          touch .gdignore
          mkdir -p build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip -q Godot_v3.5.3-stable_linux_headless.64.zip
          chmod +x Godot_v3.5.3-stable_linux_headless.64

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          unzip -q Godot_v3.5.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/templates/3.5.3.stable/

      - name: Create Export Presets
        run: |
          # كتابة ملف الإعدادات مع التأكد من الصيغة
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          export_path="build/game.apk"
          patch_list=PoolStringArray(  )
          [preset.0.options]
          package/unique_name="com.mj69077.gamealfajr"
          package/name="Game Alfajr"
          package/signed=false
          package/architecture_2=true
          EOF

      - name: Build APK
        run: |
          # محاولة التصدير مع تجاهل بعض الأخطاء غير المؤثرة
          ./Godot_v3.5.3-stable_linux_headless.64 --export "Android" build/game.apk || echo "Build stopped, checking logs..."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/game.apk
