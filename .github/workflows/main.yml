name: Build Android APK (Godot 4)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Move
        run: |
          unzip -o Kk.zip -d ./ || unzip -o Kk -d ./ || true
          PROJECT_DIR=$(find . -name "project.godot" -printf '%h\n' | head -n 1)
          if [ -n "$PROJECT_DIR" ] && [ "$PROJECT_DIR" != "." ]; then
            cp -r "$PROJECT_DIR"/* ./
          fi
          mkdir -p build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Godot 4
        run: |
          # تحميل إصدار جودو 4.3 المخصص للينكس (Headless)
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          mv Godot_v4.3-stable_linux.x86_64 godot4

      - name: Download Export Templates (Godot 4)
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/

      - name: Create Export Presets (Godot 4 Format)
        run: |
          cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/game.apk"
          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          package/unique_name="com.mj69077.gamealfajr"
          package/name="Game Alfajr"
          architecture/armeabi-v7a=true
          architecture/arm64-v8a=true
          architecture/x86=false
          architecture/x86_64=false
          keystore/debug=""
          keystore/debug_user=""
          keystore/debug_password=""
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          EOF

      - name: Build APK (Godot 4)
        run: |
          # في جودو 4، نستخدم --export-release وتمرير مسار الـ SDK عبر البيئة
          ./godot4 --headless --export-release "Android" build/game.apk --display-driver headless --env "ANDROID_HOME=$ANDROID_HOME"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/game.apk
